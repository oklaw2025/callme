<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搵樓！搵我O.K.LAW！</title>
    
    <!-- 外部資源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    
    <!-- 自訂樣式 -->
    <link rel="stylesheet" href="myStyle.css">
    
    <style>
        .media-container { 
            position: relative; 
            padding-bottom: 56.25%; 
            height: 0; 
            overflow: hidden; 
            border-radius: 12px 12px 0 0; 
        }
        .media-container iframe, 
        .media-container img { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            border: none; 
            object-fit: cover; 
        }
        .fade-enter-active, .fade-leave-active { 
            transition: opacity 0.3s ease; 
        }
        .fade-enter-from, .fade-leave-to { 
            opacity: 0; 
        }
    </style>
</head>
<body id="app" :class="currentTheme">

<div class="min-h-screen pb-24">
   
    <!-- Header -->
    <header class="custom-header backdrop-blur-md sticky top-0 z-50 p-4 shadow-xl">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="font-black text-2xl text-gradient">搵樓！搵我O.K.LAW！</div>
            <div class="flex flex-wrap justify-center gap-2">
                <button v-for="(name, key) in themes" 
                        @click="currentTheme = key" 
                        :class="currentTheme === key ? 'ring-2 ring-white/80 scale-105' : 'opacity-75 hover:opacity-100'"
                        class="px-4 py-1.5 rounded-full text-xs font-bold transition-all border border-white/20 bg-slate-800/80">
                    {{ name }}
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto p-4 min-h-screen">
        <!-- 篩選器 -->
        <div class="custom-card rounded-2xl p-6 mb-8 shadow-2xl">
            <div class="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4">
                <h2 class="font-bold text-xl flex items-center">🎯 精確搵樓</h2>
                <div class="flex items-center bg-black/20 p-1 rounded-xl">
                    <button @click="matchMode = 'OR'" 
                            :class="matchMode === 'OR' ? 'btn-accent text-white' : 'text-dim'" 
                            class="px-4 py-2 rounded-lg text-sm font-bold transition-all">部分符合</button>
                    <button @click="matchMode = 'AND'" 
                            :class="matchMode === 'AND' ? 'btn-accent text-white' : 'text-dim'" 
                            class="px-4 py-2 rounded-lg text-sm font-bold transition-all">同時符合</button>
                </div>
            </div>
            <div class="flex flex-wrap gap-2">
                <button @click="selectedTags = []" 
                        class="px-4 py-2 rounded-lg text-sm border border-slate-500 text-dim hover:bg-slate-700">清空全部</button>
                <button v-for="tag in allTags" :key="tag" 
                        @click="toggleTag(tag)" 
                        :class="selectedTags.includes(tag) ? 'btn-accent text-white' : 'bg-black/10 text-dim border border-slate-500/50'" 
                        class="px-4 py-2 rounded-lg text-sm transition-all shadow-md">
                    {{ tag }}
                </button>
            </div>
        </div>

        <!-- 盤源列表 -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div v-for="item in displayedItems" :key="item.id" 
                 class="custom-card rounded-2xl overflow-hidden hover:scale-[1.02] transition-all shadow-lg group">
                <div class="media-container bg-slate-900">
                    <template v-if="item.type === 'video'">
                        <div v-html="item.embedCode"></div>
                    </template>
                    <template v-else-if="item.type === 'images'">
                        <img :src="item.images[0]" class="cursor-pointer" @click="openGallery(item)">
                        <div class="absolute bottom-3 right-3 bg-black/70 text-white text-xs px-2 py-1 rounded-md pointer-events-none">
                            🖼️ {{ item.images.length }} 張
                        </div>
                    </template>
                </div>
                <div class="p-5">
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="font-bold text-lg group-hover:text-blue-400 transition-colors">{{ item.title }}</h3>
                        <span class="text-[10px] text-dim font-mono">ID: {{ item.id }}</span>
                    </div>
                    <div class="flex flex-wrap gap-2 mb-6">
                        <span v-for="t in item.tags" 
                              class="text-[10px] font-bold bg-black/20 text-dim px-2 py-1 rounded">#{{ t }}</span>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <button @click="shareWhatsApp(item)" 
                                class="bg-[#25D366] text-white py-2.5 rounded-xl text-sm font-bold transition hover:brightness-110">WhatsApp</button>
                        <button @click="shareWeChat(item)" 
                                class="bg-[#07C160] text-white py-2.5 rounded-xl text-sm font-bold transition hover:brightness-110">微信</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 分頁與無結果 -->
        <div v-if="hasMore" class="mt-12 text-center">
            <button @click="loadMore" 
                    class="custom-card border-none px-12 py-4 rounded-full font-bold shadow-xl hover:scale-105 transition">
                顯示更多 (還有 {{ remainingCount }} 條)
            </button>
        </div>

        <div v-if="filteredItems.length === 0" class="py-20 text-center text-dim">
            <p class="text-5xl mb-4">🏠</p>
            <p class="text-lg">暫時沒有符合標籤的盤源</p>
        </div>

        <!-- 底部聯絡 -->
        <section class="mt-20 bg-gradient-to-br from-blue-900 to-indigo-950 rounded-3xl p-10 text-center border border-white/10 shadow-2xl">
            <h2 class="text-3xl font-black text-white mb-6">搵樓 Call 我</h2>
            <div class="flex flex-col md:flex-row justify-center gap-4">
                <a href="tel:+85254093210" 
                   class="bg-white text-blue-900 px-8 py-4 rounded-2xl font-bold transition hover:scale-105">📞 5409 3210</a>
                <a href="https://wa.me/85254093210" 
                   class="bg-green-600 text-white px-8 py-4 rounded-2xl font-bold transition hover:scale-105">💬 WhatsApp</a>
            </div>
        </section>
    </main>

    <!-- 圖片燈箱 -->
    <transition name="fade">
        <div v-if="gallery.isOpen" class="fixed inset-0 z-[100] bg-black/95 flex flex-col items-center justify-center p-4">
            <button @click="closeGallery" class="absolute top-6 right-6 text-white text-5xl font-light">&times;</button>
            <div class="relative w-full max-w-5xl flex items-center justify-center">
                <button @click="prevImg" class="absolute -left-4 bg-black/60 hover:bg-black/80 p-4 rounded-full text-white text-2xl transition">❮</button>
                <img :src="gallery.images[gallery.index]" class="max-h-[85vh] max-w-full object-contain rounded-lg">
                <button @click="nextImg" class="absolute -right-4 bg-black/60 hover:bg-black/80 p-4 rounded-full text-white text-2xl transition">❯</button>
            </div>
            <div class="mt-6 text-white font-bold text-lg">
                {{ gallery.index + 1 }} / {{ gallery.images.length }}
            </div>
        </div>
    </transition>
</div>

<!-- === 重要：腳本移到這裡 === -->
<script src="data.js"></script>
<script src="logic.js"></script>

</body>
</html>
