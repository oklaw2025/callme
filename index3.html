<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搵樓！搵我O.K.LAW！</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="myStyle.css">
    
    <style>
        .media-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 12px 12px 0 0; }
        .media-container iframe, .media-container img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; object-fit: cover; }
        .fade-enter-active, .fade-leave-active { transition: opacity 0.3s ease; }
        .fade-enter-from, .fade-leave-to { opacity: 0; }
    </style>
</head>
<body>

<!-- Vue 根元素 -->
<div id="app">

<div class="min-h-screen pb-24" :class="currentTheme">
   
    <!-- Header -->
    <header class="custom-header backdrop-blur-md sticky top-0 z-50 p-4 shadow-xl">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="font-black text-2xl text-gradient">搵樓！搵我O.K.LAW！</div>
            <div class="flex flex-wrap justify-center gap-2">
                <button v-for="(name, key) in themes" 
                        @click="currentTheme = key" 
                        :class="currentTheme === key ? 'ring-2 ring-white/80 scale-105' : 'opacity-75 hover:opacity-100'"
                        class="px-4 py-1.5 rounded-full text-xs font-bold transition-all border border-white/20 bg-slate-800/80">
                    {{ name }}
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto p-4 min-h-screen">
        <!-- 篩選器、列表等內容保持不變... -->
        <!-- （為了縮短篇幅，這裡省略中間內容，你可以保留你之前的中間部分） -->

        <!-- ... 你的篩選器、盤源列表、底部聯絡區 ... -->

    </main>

    <!-- 圖片燈箱 -->
    <transition name="fade">
        <div v-if="gallery.isOpen" class="fixed inset-0 z-[100] bg-black/95 flex flex-col items-center justify-center p-4">
            <button @click="closeGallery" class="absolute top-6 right-6 text-white text-5xl">&times;</button>
            <div class="relative w-full max-w-5xl flex items-center justify-center">
                <button @click="prevImg" class="absolute left-0 bg-black/60 p-4 rounded-full text-white">❮</button>
                <img :src="gallery.images[gallery.index]" class="max-h-[85vh] max-w-full object-contain">
                <button @click="nextImg" class="absolute right-0 bg-black/60 p-4 rounded-full text-white">❯</button>
            </div>
            <div class="mt-6 text-white font-bold">{{ gallery.index + 1 }} / {{ gallery.images.length }}</div>
        </div>
    </transition>
</div>

</div> <!-- #app 結束 -->

<!-- ====================== 腳本一定要在這裡 ====================== -->
<script src="data.js"></script>
<script src="logic.js"></script>

</body>
</html>
